name: Deploy Winget Feed

on:
  push:
    branches: [main]
    paths:
      - "source.json"
      - "index.json"
      - "staticwebapp.config.json"
      - "manifests/**"
      - "packageManifests/**"
      - "scripts/prepare_site.ps1"
      - ".github/workflows/deploy-feed.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site payload
        shell: pwsh
        run: ./scripts/prepare_site.ps1

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: _site
          skip_app_build: true
